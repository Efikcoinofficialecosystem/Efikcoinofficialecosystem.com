<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE ETERNAL | Verified Sovereign Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --gold: #f2bc1b; --dark: #010409; }
        body { background: var(--dark); color: #f0f6fc; font-family: 'Inter', sans-serif; }
        .gate-screen { position: fixed; inset: 0; z-index: 1000; background: var(--dark); display: flex; align-items: center; justify-content: center; }
        .glass { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; padding: 40px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 800; border-radius: 12px; width: 100%; padding: 15px; }
        .input-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 12px; width: 100%; color: white; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="otpGate" class="gate-screen">
        <div class="glass max-w-sm w-full text-center space-y-6">
            <img src="https://raw.githubusercontent.com/Efikcoinofficialecosystem/efikcoin-eternal/main/1772019882787.png" class="w-20 h-20 mx-auto rounded-full border border-yellow-500 shadow-xl">
            <h2 class="text-xl font-black uppercase tracking-tighter text-yellow-500">Human Verification</h2>
            
            <div id="step1">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-4">Enter Email to Receive Access Code</p>
                <input id="userEmail" type="email" placeholder="Email Address" class="input-box">
                <button onclick="sendRealOTP()" id="sendBtn" class="btn-gold mt-6 uppercase text-xs">Send Verification Code</button>
            </div>

            <div id="step2" class="hidden">
                <p class="text-[10px] text-green-500 uppercase font-bold mb-4">Code Sent! Check your Inbox</p>
                <input id="otpInput" type="text" placeholder="6-Digit Code" class="input-box text-center tracking-[1em] text-xl font-black">
                <button onclick="verifyOTP()" class="btn-gold mt-6 uppercase text-xs">Verify & Link Wallet</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden p-6 opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-2xl font-black text-yellow-500">ECE LEGACY</h1>
            <div class="text-right">
                <p id="activeUser" class="text-xs font-bold"></p>
                <p id="activeWallet" class="text-[10px] font-mono text-gray-500"></p>
            </div>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="glass space-y-4">
                <h3 class="text-xs font-black uppercase text-gray-500">Sovereign Swap</h3>
                <input id="tradeAmt" type="number" placeholder="0.00 BNB" class="input-box text-2xl font-black">
                <button onclick="executeSwap()" class="btn-gold py-6 text-lg uppercase">Confirm Blockchain Trade</button>
            </div>
            
            <div class="glass h-[400px] overflow-hidden p-1">
                <iframe width="100%" height="100%" src="https://www.geckoterminal.com/bsc/pools/0x7fabe0647d6e81075727a858e65860955e5170b6?embed=1"></iframe>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION (Set these up at EmailJS.com)
        const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY"; 
        const SERVICE_ID = "YOUR_SERVICE_ID";
        const TEMPLATE_ID = "YOUR_TEMPLATE_ID";

        let generatedOTP;
        let userEmail;

        // Initialize EmailJS
        (function() { emailjs.init(EMAILJS_PUBLIC_KEY); })();

        async function sendRealOTP() {
            userEmail = document.getElementById('userEmail').value;
            if(!userEmail.includes("@")) return alert("Invalid Email");

            generatedOTP = Math.floor(100000 + Math.random() * 900000); // Create 6-digit code
            
            document.getElementById('sendBtn').innerText = "SENDING...";

            // REAL EMAIL CALL
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                to_email: userEmail,
                otp_code: generatedOTP,
                project_name: "EfikCoin Eternal"
            }).then(() => {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }, (err) => {
                alert("Email Service Error. Check Console.");
                console.log(err);
            });
        }

        async function verifyOTP() {
            const input = document.getElementById('otpInput').value;
            if(input == generatedOTP) {
                connectWallet();
            } else {
                alert("Security Error: Invalid OTP Code.");
            }
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Install Trust Wallet / MetaMask");
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            const addr = await signer.getAddress();

            // UNLOCK SURFACE
            document.getElementById('otpGate').style.display = "none";
            document.getElementById('mainDashboard').classList.remove('hidden');
            setTimeout(() => document.getElementById('mainDashboard').style.opacity = "1", 100);
            
            document.getElementById('activeUser').innerText = "Verified: " + userEmail;
            document.getElementById('activeWallet').innerText = addr;
        }

        async function executeSwap() {
            // This calls the REAL ECE Contract
            alert("Executing real-life transaction on BSC...");
            // [Detailed Swap Logic from previous turn goes here]
        }
    </script>
</body>
</html>
